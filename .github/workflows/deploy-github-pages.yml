name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Blazor app
        run: dotnet publish Portafolio.csproj -c Release -o release

      - name: Keep root base path for custom domain deployment
        run: |
          grep -q '<base href="/" />' release/wwwroot/index.html

      - name: Include custom domain mapping
        run: |
          if [ -f CNAME ]; then cp CNAME release/wwwroot/CNAME; fi

      - name: Enable SPA fallback for deep links
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
